{% extends 'base.html' %}
{% load static %}
{% block title %}All Posts{% endblock %}

{% block content %}

<style>
    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
</style>

<h2 class="mb-4">📰 All Posts</h2>

<!-- SEARCH BAR -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form class="row g-2" id="filter-form">
 
            <div class="col-md-5">
                <input type="text" id="filter-in" name="q" class="form-control" placeholder="Search posts...">
            </div>

            <div class="col-md-4">
                <select name="category" class="form-select" id="filter-cat">
                    <option value="">All Categories</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3 d-grid">
                <button type="submit" class="btn btn-primary">Search</button>
            </div>
        </form>
    </div>
</div>

<!-- POSTS -->
<div id="post-container">
    {% include "blog/post_list_partial.html" with posts=page_obj %}
</div>

<div id="loader" class="text-center my-3" style="display:none;">
    <p>Loading more posts...</p>
</div>

{% endblock %}

{% block js %}
    <script src={% static 'js/post_list.js' %}></script>
{% endblock %}
