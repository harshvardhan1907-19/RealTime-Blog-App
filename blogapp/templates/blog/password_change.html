<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Change</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="display: grid; place-items: center; margin-top: 2rem;">
    <form method="post" class="shadow p-4 rounded bg-light" style="width: 500px;">
        {% csrf_token %}
    
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-bold">{{ field.label }}</label>
            {{ field }} <!-- Your 'form-control' class is here -->
    
            {% if field.help_text %}
            <small class="text-muted d-block mt-1">
                {{ field.help_text|safe }}
            </small>
            {% endif %}
    
            {% for error in field.errors %}
            <div class="text-danger small">{{ error }}</div>
            {% endfor %}
        </div>
        {% endfor %}
    
        <button type="submit" class="btn btn-success w-100 mt-3">Update Password</button>
    </form>
</body>
</html>
